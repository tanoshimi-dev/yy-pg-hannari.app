services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yy-pg-hannari
      POSTGRES_PASSWORD: hannari_password
      POSTGRES_DB: yy-pg-hannari_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yy-pg-hannari -d yy-pg-hannari_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: sys/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://yy-pg-hannari:hannari_password@db:5432/yy-pg-hannari_db?schema=public
      CONTENTS_DIR: /app/doc/contents
    depends_on:
      db:
        condition: service_healthy
    # volumes:
    #   - ./backend/src:/app/src
    #   - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    # volumes:
    #   - ./frontend/src:/app/src

volumes:
  postgres_data:
