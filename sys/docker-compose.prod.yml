# ============================================================
# 本番用 Docker Compose
# .env ファイルをこのファイルと同じディレクトリに配置すること
# テンプレート: .env.prod.example
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: yy-pg-hannari-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yy-pg-hannari-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: yy-pg-hannari-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=https://yy-pg.hannari.app/auth/google/callback
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://yy-pg.hannari.app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yy-pg-hannari-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yy-pg-hannari-api.rule=Host(`yy-pg.hannari.app`) && (PathPrefix(`/auth/google`) || PathPrefix(`/auth/profile`) || PathPrefix(`/contents`) || PathPrefix(`/quizzes`) || PathPrefix(`/progress`))"
      - "traefik.http.routers.yy-pg-hannari-api.entrypoints=https"
      - "traefik.http.routers.yy-pg-hannari-api.tls=true"
      - "traefik.http.routers.yy-pg-hannari-api.tls.certresolver=cloudflare"
      - "traefik.http.services.yy-pg-hannari-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-network"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: https://yy-pg.hannari.app
    container_name: yy-pg-hannari-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - yy-pg-hannari-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yy-pg-hannari.rule=Host(`yy-pg.hannari.app`)"
      - "traefik.http.routers.yy-pg-hannari.entrypoints=https"
      - "traefik.http.routers.yy-pg-hannari.tls=true"
      - "traefik.http.routers.yy-pg-hannari.tls.certresolver=cloudflare"
      - "traefik.http.routers.yy-pg-hannari.priority=1"
      - "traefik.http.services.yy-pg-hannari.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-network"

volumes:
  postgres_data:

networks:
  yy-pg-hannari-network:
    driver: bridge
  traefik-network:
    external: true
